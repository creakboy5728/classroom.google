kind = "web"
previewPath = "/"
title = "PeerSavr"
version = "1.0.0"
id = "artifacts/peersavr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18515

[services.development]
run = "pnpm --filter @workspace/peersavr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/peersavr", "run", "build" ]
publicDir = "artifacts/peersavr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18515"
BASE_PATH = "/"
